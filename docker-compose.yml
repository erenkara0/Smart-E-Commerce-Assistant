name: mikroasistan

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      CORS_ALLOW_CREDENTIALS: "false"
      SQLITE_DB_PATH: /app/storage/app.db
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mikroasistan_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mikroasistan_network
    restart: unless-stopped

volumes:
  backend_storage:

networks:
  mikroasistan_network:
    driver: bridge